name: SecureShield CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: secureshield-api
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ============================================================
  # GATE 1 — Secret Scanning
  # ============================================================
  secret-scan:
    name: "Gate 1: Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # GATE 2 — Code Quality (SonarQube) — coming next
  # ============================================================
  code-quality:
    name: "Gate 2: Code Quality (SonarQube)"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder — SonarQube coming next
        run: echo "SonarQube gate will be added in next step"

  # ============================================================
  # Build Docker image — only if gates pass
  # ============================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [secret-scan, code-quality]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./app

      - name: Save image as artifact
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

