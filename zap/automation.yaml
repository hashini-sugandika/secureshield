env:
  contexts:
    - name: secureshield
      urls:
        - http://localhost:3000
      includePaths:
        - "http://localhost:3000.*"
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true
jobs:
  - type: spider
    name: spider
    parameters:
      context: secureshield
      maxDuration: 2
      acceptCookies: false
  - type: activeScan
    name: activeScan
    parameters:
      context: secureshield
      policy: Default Policy
  - type: report
    name: report
    parameters:
      template: traditional-html
      reportDir: /zap/reports
      reportFile: zap-report
      reportTitle: SecureShield ZAP Report
      reportDescription: DAST scan results for SecureShield API
  - type: outputSummary
    name: outputSummary
    parameters:
      format: Long
      outputSummary:
        summaryFile: /zap/reports/zap-summary.json
