# ConstraintTemplate — defines the policy logic in Rego
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: norootcontainer
spec:
  crd:
    spec:
      names:
        kind: NoRootContainer
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package norootcontainer
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.securityContext.runAsNonRoot
          msg := sprintf("Container '%v' must set securityContext.runAsNonRoot=true", [container.name])
        }
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          container.securityContext.runAsUser == 0
          msg := sprintf("Container '%v' must not run as root (runAsUser=0)", [container.name])
        }
---
# Constraint — enforces the policy on all namespaces except system ones
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: NoRootContainer
metadata:
  name: no-root-container
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
